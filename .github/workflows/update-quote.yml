name: Update Quote

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-quote:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch CSV and pick random quote
        run: |
          CSV_URL="https://docs.google.com/spreadsheets/d/e/2PACX-1vT8621JTtpb0DL-2z-F-Y832p8gelVh7K5GEuGdrAPK37Dh_9D-driEl2yoM7Te0FmKmETkz1SlvKZU/pub?gid=0&single=true&output=csv"
          curl -sL "$CSV_URL" -o quotes.csv
          python3 -c "
          import csv, json, random, sys
          with open('quotes.csv', newline='', encoding='utf-8') as f:
              rows = list(csv.reader(f))
          if len(rows) < 2:
              print('No quotes found in CSV', file=sys.stderr)
              sys.exit(1)
          row = random.choice(rows[1:])
          data = {'quote': row[0].strip(), 'author': row[1].strip() if len(row) > 1 else 'Unknown'}
          with open('current-quote.json', 'w') as out:
              json.dump(data, out)
          print(json.dumps(data, indent=2))
          "

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add current-quote.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update current quote"
            git push
          fi
